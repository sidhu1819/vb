<div style="font-family: Arial, sans-serif; max-width: 600px; padding: 20px; border: 1px solid #1a1f36; background-color: #04060f; color: #fff; border-radius: 12px;">
  <h2 style="color: #00c6ff;">System Alert - VB Software Solutions</h2>
  <div style="background-color: #1a1f36; padding: 15px; border-radius: 8px; margin: 20px 0;">
    <p><strong>Event:</strong> {{eventSummary}}</p>
    <p><strong>Details:</strong> {{details}}</p>
  </div>
  <div style="text-align: center; margin-top: 30px;">
    <a href="{{actionUrl}}" style="background-color: #00c6ff; color: #04060f; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block;">{{actionText}}</a>
  </div>
</div>
